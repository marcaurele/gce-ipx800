---
name: Build status

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  eclint:
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.com/greut/eclint:latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: fix git
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE:-$(pwd)}"

      - name: eclint version
        run: eclint -version

      - name: linting based on .editorconfig
        run: eclint -color=always

  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Lint with ruff
      run: uv run ruff check --show-files --show-fixes

    - name: Test with pytest
      run: uv run pytest --cov=gce_ipx800 tests/

    - name: Code coverage
      run: uv run codecov --token=$token
      env:
        token: ${{ secrets.CODECOV_TOKEN }}
